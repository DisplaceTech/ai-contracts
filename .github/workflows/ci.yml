name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt every JavaScript-based action into the Node 24 runtime ahead of
  # GitHub's June 2026 forced cut-over. `actions/checkout@v4` and
  # setup-php still ship Node 20 bundles; without this, each run emits a
  # "Node.js 20 actions are deprecated" warning per leg. Once the
  # upstream actions ship Node-24 bundles natively, this line can drop.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: cs + static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to 2.36.0: setup-php 2.37.x stopped installing PHP on the
      # macos-14 runners on 2026-06-12 (probe in DisplaceTech/ext-template).
      # Unpin when upstream ships a fix.
      - uses: shivammathur/setup-php@2.36.0
        with:
          php-version: '8.4'
          coverage: none

      - run: composer validate --strict

      - run: composer install --no-interaction --no-progress

      - run: composer cs

      - run: composer stan

  test:
    name: test (PHP ${{ matrix.php }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]   # macos-14 is the arm64 runner
        # 8.5 is the current stable; 8.4 is the most-deployed; 8.3 is
        # security-only through end of 2026 but still widely installed.
        php: ['8.3', '8.4', '8.5']
        exclude:
          # setup-php cannot currently install PHP 8.5 on the macos-14
          # runners (2026-06-12: 2.37.x fails for every PHP version there,
          # and 2.36.0 predates 8.5). Re-add this leg when ext-template's
          # "macOS probe" workflow passes on @v2 again.
          - os: macos-14
            php: '8.5'
    steps:
      - uses: actions/checkout@v4

      # Pinned to 2.36.0: setup-php 2.37.x stopped installing PHP on the
      # macos-14 runners on 2026-06-12 (probe in DisplaceTech/ext-template).
      # Unpin when upstream ships a fix.
      - uses: shivammathur/setup-php@2.36.0
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer install --no-interaction --no-progress

      - run: composer test
